name: Sync OGE Trump Trades

on:
  schedule:
    # Runs every 6 hours (02:00, 08:00, 14:00, 20:00 UTC = 10:00, 16:00, 22:00, 04:00 SGT)
    - cron: "0 2,8,14,20 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt && playwright install --with-deps chromium

      - name: Fetch OGE Trump trade data
        run: python scripts/fetch_oge.py

      - name: Commit and push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/trump_trades.json
          git diff --staged --quiet || git commit -m "Update OGE Trump trades [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push
